name: MELPA Build Test

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  melpa-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your package
        uses: actions/checkout@v5
        with:
          path: pearl-paren-style

      - name: Checkout MELPA
        uses: actions/checkout@v5
        with:
          repository: melpa/melpa
          path: melpa

      - name: Setup Emacs
        uses: jcs090218/setup-emacs@master
        with:
          version: 29.1

      - name: Install imagemagick and other build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Find all .el files
        run: |
          # Find all .el files
          find . -name "*.el" -not -path "./melpa/*" > all-el-files.txt
          # Main package file is hardcoded to pearl-paren-style.el
          echo "./pearl-paren-style.el" > main-el-files.txt

          echo "All .el files:"
          cat all-el-files.txt
          echo ""
          echo "Main package file (for package-lint):"
          cat main-el-files.txt

      - name: Install packages and run all checks
        run: |
          exec > >(tee -a build-logs.txt) 2>&1
          # First, refresh package archives and install required packages
          emacs -Q --batch \
                --eval "(package-refresh-contents)" \
                --eval "(package-install 'package-lint)" \
                --eval "(package-install 'flycheck)" \
                --eval "(package-install 'checkdoc)" 2>&1 | grep -v "^Loading"

          # Run package-lint only on main package file
          echo "========================================="
          echo "Running package-lint on main package file..."
          echo "========================================="
          while IFS= read -r file; do
            echo "Checking $file with package-lint..."
            emacs -Q --batch \
                  --eval "(package-initialize)" \
                  -l package-lint \
                  -f package-lint-batch-and-exit "$file" 2>&1 || exit 1
          done < main-el-files.txt

          # Run flycheck and checkdoc on ALL files
          echo "========================================="
          echo "Running flycheck and checkdoc on ALL files..."
          echo "========================================="
          while IFS= read -r file; do
            echo "Checking $file..."

            # Run flycheck
            echo "--- flycheck ---"
            emacs -Q --batch \
                  --eval "(package-initialize)" \
                  -l flycheck \
                  --eval "(setq flycheck-emacs-lisp-load-path '(\".\"))" \
                  --eval "(require 'flycheck)" \
                  --eval "(find-file \"$file\")" \
                  --eval "(flycheck-mode 1)" \
                  --eval "(flycheck-buffer)" \
                  --eval "(when (flycheck-has-current-errors-p) (flycheck-list-errors) (kill-emacs 1))" \
                  --eval "(kill-emacs 0)" 2>&1 || exit 1

            # Run checkdoc
            echo "--- checkdoc ---"
            emacs -Q --batch \
                  --eval "(package-initialize)" \
                  -l checkdoc \
                  --eval "(find-file \"$file\")" \
                  --eval "(setq byte-compile-docstring-max-column 120)" \
                  --eval "(setq checkdoc-verb-check-experimental-flag nil)" \
                  --eval "(checkdoc-current-buffer)" \
                  --eval "(let ((wbuf (get-buffer \"*Warnings*\"))) \
                            (when (and wbuf (> (length (with-current-buffer wbuf (buffer-string))) 0)) \
                              (princ (with-current-buffer wbuf (buffer-string))) \
                              (kill-emacs 1)))" \
                  --eval "(kill-emacs 0)" 2>&1 || exit 1

            echo "========================================="
          done < all-el-files.txt

      - name: Create recipe
        run: |
          cat > melpa/recipes/pearl-paren-style << 'EOF'
          (pearl-paren-style
           :repo "${{ github.repository }}"
           :fetcher github)
          EOF

      - name: Build package
        run: |
          exec > >(tee -a build-logs.txt) 2>&1
          cd melpa
          make recipes/pearl-paren-style

      - name: Verify package was built
        run: |
          # Check if any package files were generated
          if ls melpa/packages/pearl-paren-style-*.tar 2>/dev/null; then
            echo "Package built successfully"
            # List all built packages
            ls -la melpa/packages/pearl-paren-style-*.tar
          else
            echo "Error: No package file found"
            exit 1
          fi

      - name: Check build output
        run: |
          # Ensure the tar file is not empty
          for f in melpa/packages/pearl-paren-style-*.tar; do
            if [ -s "$f" ]; then
              echo "Package $f is non-empty"
              # Display some info about the package
              tar -tzf "$f" | head -5
            else
              echo "Error: Package $f is empty"
              exit 1
            fi
          done

      - name: Quick load test
        run: |
          # Extract the package and try to load it in Emacs
          for f in melpa/packages/pearl-paren-style-*.tar; do
            echo "Testing package: $f"
            tar -xf "$f" -C /tmp
            PACKAGE_DIR=$(basename "$f" .tar)
            emacs -Q --batch \
                  -L /tmp/"$PACKAGE_DIR" \
                  -l /tmp/"$PACKAGE_DIR"/pearl-paren-style.el \
                  --eval "(message \"Package loaded successfully\")" \
                  --eval "(condition-case err (progn (require 'pearl-paren-style) (message \"Require succeeded\")) (error (message \"Require failed: %s\" err)))"
            # Clean up
            rm -rf /tmp/"$PACKAGE_DIR"
          done

      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          ignore_cert: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "❌ MELPA Build Failed - ${{ github.repository }}"
          html_body: |
            <h2 style="color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 10px; margin-bottom: 20px;">MELPA Build Failed</h2>
            <table style="border-collapse: collapse; font-family: Arial, sans-serif; margin: 20px 0;">
              <tr>
                <td style="padding: 10px; font-weight: bold; color: #555; width: 100px; border-bottom: 1px solid #eee;">Repository</td>
                <td style="padding: 10px; border-bottom: 1px solid #eee;">${{ github.repository }}</td>
              </tr>
              <tr style="background-color: #f9f9f9;">
                <td style="padding: 10px; font-weight: bold; color: #555; border-bottom: 1px solid #eee;">Branch</td>
                <td style="padding: 10px; border-bottom: 1px solid #eee;">${{ github.ref }}</td>
              </tr>
              <tr>
                <td style="padding: 10px; font-weight: bold; color: #555;">Commit</td>
                <td style="padding: 10px; font-family: monospace; font-size: 0.9em; color: #333;">${{ github.sha }}</td>
              </tr>
            </table>
            <hr style="border: none; border-top: 2px solid #eee; margin: 30px 0;">
            <p style="color: #666; font-style: italic; margin-top: 20px;">Detailed error logs are attached to this email.</p>
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          attachments: build-logs.txt
